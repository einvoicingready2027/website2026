name: Deploy to IONOS (Manual)

on:
  workflow_dispatch: # Erlaubt den manuellen Start über den "Actions" Tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🚀 Sync files to IONOS (lftp)
        env:
          # Wir nutzen Umgebungsvariablen für maximale Sicherheit und Sonderzeichen-Stabilität
          PASSWORD: ${{ secrets.IONOS_SFTP }}
          USERNAME: ${{ secrets.SFTP_USERNAME }}
          SERVER: ${{ secrets.SFTP_SERVER }}
        run: |
          lftp -c "set sftp:auto-confirm yes; \
                  open -u $USERNAME,$PASSWORD sftp://$SERVER:22; \
                  mirror -R \
                  --exclude .git/ \
                  --exclude .github/ \
                  --exclude .cursor/ \
                  --exclude README.md \
                  --exclude .htaccess \
                  . /private/website/; \
                  quit"
