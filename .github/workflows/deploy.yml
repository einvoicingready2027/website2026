name: Deploy to IONOS (Manual)

on:
  workflow_dispatch: # Erlaubt den manuellen Start über den "Actions" Tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🚀 Sync files to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP }}
          protocol: ftps
          port: 22
          # Pfad auf deinem IONOS Server
          server-dir: /private/website/
          # Dateien ausschließen
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.cursor/**
            **/.htaccess
