name: Deploy to IONOS (Manual)

on:
  workflow_dispatch: # Erlaubt den manuellen Start über den "Actions" Tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🚀 Sync files to IONOS
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_SERVER }}
          password: ${{ secrets.IONOS_SFTP }}
          port: 22
          local_path: './*'
          remote_path: '/private/website/'
          sftp_only: true
          # Dateien ausschließen
          delete_remote_files: false
          exclude: |
            .git*
            README.md
            .cursor/
